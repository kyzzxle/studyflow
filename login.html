<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyFlow — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">

  <div class="auth-container">
    <!-- Left Panel -->
    <div class="auth-left">
      <div class="brand">
        <span class="brand-icon">📖</span>
        <h1 class="brand-name">StudyFlow</h1>
      </div>
      <p class="brand-tagline">Plan smarter.<br/>Study better.</p>
      <div class="auth-illustration">
        <div class="floating-card fc1">📅 Schedule Tasks</div>
        <div class="floating-card fc2">🔔 Get Reminders</div>
        <div class="floating-card fc3">📊 Track Progress</div>
      </div>
    </div>

    <!-- Right Panel: Form -->
    <div class="auth-right">
      <div class="form-tabs">
        <button class="tab-btn active" onclick="showTab('login')">Login</button>
        <button class="tab-btn" onclick="showTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active-form" onsubmit="handleLogin(event)">
        <h2>Welcome back 👋</h2>
        <p class="form-subtitle">Login to your study dashboard</p>

        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@email.com" />
          <span class="field-error" id="loginEmailErr"></span>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" />
          <span class="field-error" id="loginPasswordErr"></span>
        </div>
        <span class="field-error form-level-error" id="loginFormErr"></span>
        <button type="submit" class="btn-primary">Login</button>
        <p class="form-switch">Don't have an account? <a href="#" onclick="showTab('register')">Register</a></p>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
        <h2>Create Account ✨</h2>
        <p class="form-subtitle">Start planning your studies today</p>

        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" placeholder="Magnus Carlsen" />
          <span class="field-error" id="regNameErr"></span>
        </div>
        <div class="form-group">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" placeholder="you@email.com" />
          <span class="field-error" id="regEmailErr"></span>
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="At least 6 characters" />
          <span class="field-error" id="regPasswordErr"></span>
        </div>
        <div class="form-group">
          <label for="regConfirm">Confirm Password</label>
          <input type="password" id="regConfirm" placeholder="Re-enter password" />
          <span class="field-error" id="regConfirmErr"></span>
        </div>
        <span class="field-error form-level-error" id="regFormErr"></span>
        <button type="submit" class="btn-primary">Create Account</button>
        <p class="form-switch">Already have an account? <a href="#" onclick="showTab('login')">Login</a></p>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
