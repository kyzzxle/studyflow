<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyFlow — Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="dashboard-page">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="brand-icon">📖</span>
      <span class="brand-name">StudyFlow</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" onclick="showSection('dashboard')">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a href="#" class="nav-item" onclick="showSection('tasks')">
        <span class="nav-icon">📋</span> My Tasks
      </a>
      <a href="#" class="nav-item" onclick="showSection('schedule')">
        <span class="nav-icon">📅</span> Schedule
      </a>
      <a href="#" class="nav-item" onclick="showSection('progress')">
        <span class="nav-icon">📊</span> Progress
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">J</div>
        <div>
          <div class="user-name" id="userNameDisplay">Student</div>
          <div class="user-role">Study Planner</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <div>
          <h2 class="page-title" id="pageTitle">Dashboard</h2>
          <p class="page-date" id="pageDate"></p>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="🔍 Search tasks..." oninput="searchTasks()" />
        </div>
        <button class="btn-add-task" onclick="openModal()">+ Add Task</button>
      </div>
    </header>

    <!-- ===== DASHBOARD SECTION ===== -->
    <section id="section-dashboard" class="content-section active-section">
      <div class="stats-grid">
        <div class="stat-card stat-total">
          <div class="stat-icon">📚</div>
          <div class="stat-info">
            <span class="stat-number" id="statTotal">0</span>
            <span class="stat-label">Total Tasks</span>
          </div>
        </div>
        <div class="stat-card stat-pending">
          <div class="stat-icon">⏳</div>
          <div class="stat-info">
            <span class="stat-number" id="statPending">0</span>
            <span class="stat-label">Pending</span>
          </div>
        </div>
        <div class="stat-card stat-progress">
          <div class="stat-icon">🔄</div>
          <div class="stat-info">
            <span class="stat-number" id="statInProgress">0</span>
            <span class="stat-label">In Progress</span>
          </div>
        </div>
        <div class="stat-card stat-done">
          <div class="stat-icon">✅</div>
          <div class="stat-info">
            <span class="stat-number" id="statDone">0</span>
            <span class="stat-label">Completed</span>
          </div>
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-section">
        <div class="progress-header">
          <h3>Overall Completion</h3>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
      </div>

      <!-- Upcoming Tasks -->
      <div class="section-block">
        <h3 class="block-title">📅 Upcoming Tasks</h3>
        <div id="upcomingList" class="task-list"></div>
      </div>

      <!-- Overdue Tasks -->
      <div class="section-block">
        <h3 class="block-title">🚨 Overdue Tasks</h3>
        <div id="overdueList" class="task-list"></div>
      </div>
    </section>

    <!-- ===== TASKS SECTION ===== -->
    <section id="section-tasks" class="content-section">
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
        <button class="filter-btn" onclick="filterTasks('Pending', this)">Pending</button>
        <button class="filter-btn" onclick="filterTasks('In Progress', this)">In Progress</button>
        <button class="filter-btn" onclick="filterTasks('Done', this)">Done</button>
      </div>
      <div id="tasksList" class="task-grid"></div>
    </section>

    <!-- ===== SCHEDULE SECTION ===== -->
    <section id="section-schedule" class="content-section">
      <div class="calendar-header">
        <button onclick="prevMonth()">&#8249;</button>
        <h3 id="calMonthYear"></h3>
        <button onclick="nextMonth()">&#8250;</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="schedule-tasks" id="scheduleTasks">
        <p class="empty-msg">Click a date to view tasks.</p>
      </div>
    </section>

    <!-- ===== PROGRESS SECTION ===== -->
    <section id="section-progress" class="content-section">
      <div class="progress-charts">
        <div class="chart-card">
          <h3>Tasks by Status</h3>
          <canvas id="statusChart" width="300" height="300"></canvas>
        </div>
        <div class="chart-card">
          <h3>Tasks by Subject</h3>
          <canvas id="subjectChart" width="400" height="300"></canvas>
        </div>
      </div>
    </section>
  </main>

  <!-- ===== ADD/EDIT TASK MODAL ===== -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal" id="taskModal">
      <div class="modal-header">
        <h3 id="modalTitle">Add New Task</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <form id="taskForm" onsubmit="saveTask(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="taskTitle">Task Title *</label>
            <input type="text" id="taskTitle" placeholder="e.g., Review Chapter 5" />
            <span class="field-error" id="taskTitleErr"></span>
          </div>
          <div class="form-group">
            <label for="taskSubject">Subject *</label>
            <input type="text" id="taskSubject" placeholder="e.g., Math, English..." />
            <span class="field-error" id="taskSubjectErr"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="taskDesc">Description</label>
          <textarea id="taskDesc" placeholder="Optional: Add notes or details..." rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskDate">Due Date *</label>
            <input type="date" id="taskDate" />
            <span class="field-error" id="taskDateErr"></span>
          </div>
          <div class="form-group">
            <label for="taskTime">Reminder Time</label>
            <input type="time" id="taskTime" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="Low">🟢 Low</option>
              <option value="Medium" selected>🟡 Medium</option>
              <option value="High">🔴 High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskStatus">Status</label>
            <select id="taskStatus">
              <option value="Pending">⏳ Pending</option>
              <option value="In Progress">🔄 In Progress</option>
              <option value="Done">✅ Done</option>
            </select>
          </div>
        </div>
        <input type="hidden" id="taskId" value="" />
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary" id="saveTaskBtn">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Reminder Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
</body>
</html>
